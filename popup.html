<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Marketplace Lister</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🤖 AI Listing Assistant</h1>
      <p class="version">v1.0</p>
    </div>

    <!-- Settings -->
    <div class="settings-section" id="settings-section">
      <div class="settings-header" id="settings-toggle">
        <span>⚙️ Settings</span>
        <span id="settings-arrow">▼</span>
      </div>
      <div class="settings-body" id="settings-body" style="display: none;">
        <div class="setting-item">
          <label for="api-key">🔑 Gemini API Key:</label>
          <div class="setting-input-group">
            <input
              type="password"
              id="api-key"
              placeholder="Enter your Gemini API key"
              class="setting-input"
            >
            <button id="toggle-key-visibility" class="btn-icon" title="Show/Hide key">👁️</button>
          </div>
          <p class="setting-hint">
            Get free key: <a href="https://aistudio.google.com/apikey" target="_blank">Google AI Studio</a>
          </p>
        </div>

        <div class="setting-item">
          <label for="location">📍 Your Region:</label>
          <div class="setting-input-group">
            <input
              type="text"
              id="location"
              placeholder="City or region (e.g. New York, London)"
              class="setting-input"
            >
          </div>
        </div>

        <div class="setting-item">
          <label for="language">🌐 Output Language:</label>
          <div class="setting-input-group">
            <select id="language" class="setting-input">
              <option value="en">English</option>
              <option value="zh">Chinese (中文)</option>
              <option value="es">Spanish (Español)</option>
              <option value="fr">French (Français)</option>
              <option value="ja">Japanese (日本語)</option>
              <option value="ko">Korean (한국어)</option>
            </select>
          </div>
        </div>

        <button id="save-settings" class="btn-primary">💾 Save Settings</button>
        <p id="settings-status" class="settings-status"></p>
      </div>
    </div>

    <!-- Status bar -->
    <div id="status-bar" class="status-bar">
      <span id="location-display">📍 No region set</span>
      <span id="api-key-status">🔑 Not configured</span>
    </div>

    <!-- Image upload -->
    <div class="upload-section">
      <label>📸 Select product photos (up to 5):</label>
      <div class="image-input-group">
        <input
          type="file"
          id="image-input"
          accept="image/jpeg,image/png,image/webp"
          multiple
          style="display: none"
        >
        <button id="select-image-btn" class="btn-primary">Choose Photos</button>
      </div>
      <div id="image-preview-container" class="preview-grid" style="display: none;"></div>
    </div>

    <!-- Analyze button -->
    <div class="action-section">
      <button id="analyze-btn" class="btn-primary btn-large" disabled>
        🔍 Analyze Product
      </button>
    </div>

    <!-- Result -->
    <div id="result-container" class="result-container" style="display: none;">
      <div class="result-card">
        <h3>📋 AI Generated Listing</h3>

        <div class="result-field">
          <label>Title:</label>
          <p id="result-title" class="result-value"></p>
        </div>

        <div class="result-field">
          <label>Price Range:</label>
          <p id="result-price" class="result-value"></p>
        </div>

        <div class="result-field">
          <label>Description:</label>
          <p id="result-description" class="result-value"></p>
        </div>

        <div class="result-field">
          <label>Category / Condition:</label>
          <p id="result-category" class="result-value"></p>
        </div>

        <div class="result-actions">
          <button id="autofill-btn" class="btn-success">✅ Autofill Form</button>
          <button id="new-analysis-btn" class="btn-secondary">New Analysis</button>
        </div>
      </div>
    </div>

    <!-- Loading -->
    <div id="loading-container" class="loading-container" style="display: none;">
      <div class="spinner"></div>
      <p>Analyzing product...</p>
    </div>

    <!-- Error -->
    <div id="error-container" class="error-container" style="display: none;">
      <p id="error-message"></p>
      <button id="retry-btn" class="btn-secondary">Retry</button>
    </div>

    <!-- Success -->
    <div id="success-message" class="success-message" style="display: none;"></div>

    <!-- Footer -->
    <div class="footer">
      <p>💡 Open Facebook Marketplace "Create Listing" page to use autofill</p>
      <a
        href="mailto:womendemiao@gmail.com?subject=AI%20Lister%20Feedback&body=Hi%2C%20I%20have%20some%20feedback%3A%0A%0A"
        class="feedback-link"
        target="_blank"
      >📩 Send Feedback</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
